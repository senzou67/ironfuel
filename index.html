    <!-- Force cache bust for major updates -->
    <script>
        (function(){
            var V = 55;
            var stored = 0;
            var lsWorks = true;
            try {
                stored = parseInt(localStorage.getItem('nutritrack_app_version') || '0');
                localStorage.setItem('nutritrack_app_version_test', '1');
                localStorage.removeItem('nutritrack_app_version_test');
            } catch(e) { lsWorks = false; }

            if (stored < V && lsWorks) {
                try { localStorage.setItem('nutritrack_app_version', V); } catch(e) {}
                // 1. Nuke ALL caches
                if ('caches' in window) {
                    caches.keys().then(function(keys) {
                        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                    });
                }
                // 2. Unregister all SWs, then re-register + reload
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        return Promise.all(regs.map(function(r) { return r.unregister(); }));
                    }).then(function() {
                        navigator.serviceWorker.register('/sw.js').then(function() {
                            window.location.reload(true);
                        });
                    });
                } else {
                    window.location.reload(true);
                }
            } else if ('serviceWorker' in navigator) {
                // Normal visit or private browsing: register SW + trigger update
                navigator.serviceWorker.register('/sw.js').then(function(reg) {
                    reg.update();
                });
            }
        })();
    </script>
