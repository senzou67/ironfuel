<!-- Splash screen — 2732×2732 source so it covers any phone/tablet screen.
     Capacitor will resize per device. Logo centered, red background. -->
<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
  <rect width="2732" height="2732" fill="#EF4444"/>
  <!-- 480×480 inner red square with white "1", roughly centered -->
  <g transform="translate(1126 1126)">
    <rect width="480" height="480" rx="106" fill="#EF4444" stroke="#ffffff" stroke-width="0"/>
    <text x="240" y="340" font-family="system-ui,-apple-system,Inter,Arial,sans-serif"
          font-size="298" font-weight="900" fill="#ffffff" text-anchor="middle">1</text>
  </g>
  <!-- App name below the logo -->
  <text x="1366" y="1750" font-family="system-ui,-apple-system,Inter,Arial,sans-serif"
        font-size="92" font-weight="800" fill="#ffffff" text-anchor="middle">OneFood</text>
</svg>
