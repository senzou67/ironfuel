<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Avatars Preview</title>
<style>
body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 800px; margin: 0 auto; }
.cell { background: #1a1a1a; border-radius: 12px; padding: 10px; text-align: center; }
.cell .label { font-size: 11px; color: #888; margin-top: 6px; }
.cell .name { font-size: 13px; font-weight: 700; margin-top: 2px; }
.type-title { font-size: 16px; font-weight: 700; margin: 20px 0 8px; text-align: center; }
</style>
<script>
// Minimal mocks for avatar.js
const App = { _localDateKey: () => '2026-01-01', getSelectedDate: () => new Date(), isToday: () => true };
const Storage = { getCreature: () => ({type:'fire',form:0,chosen:true}), getLogDates: () => [], getGoals: () => ({calories:2000}), getDayTotals: () => ({calories:0}), getDayLog: () => ({meals:{}}), getProfile: () => ({name:'Test'}), getCoins: () => 0, getCreatureStreak: () => ({current:0,best:0,freezesOwned:0}), _get: () => null, getSettings: () => ({}), getMeals: () => [], hasChosenStarter: () => true, hasXPBeenAwardedToday: () => true };
const TrialService = { isPaid: () => true, hasFullAccess: () => true };
const NutritionService = {};
</script>
<script src="/js/components/avatar.js"></script>
</head><body>
<h1>OneFood — Tous les Avatars</h1>
<script>
const types = ['fire', 'plant', 'water'];
const typeNames = { fire: '🔥 Feu', plant: '🌿 Plante', water: '💧 Eau' };
const formNames = ['Bébé', 'Juvénile', 'Adolescent', 'Ultime'];

for (const type of types) {
    document.write(`<div class="type-title">${typeNames[type]} — ${Creature.NAMES[type].join(' → ')}</div>`);
    document.write('<div class="grid">');
    for (let form = 0; form < 4; form++) {
        const svg = Creature.buildSVG(150, { creatureData: { type, form, chosen: true }, mood: 'happy' });
        document.write(`<div class="cell">${svg}<div class="name">${Creature.NAMES[type][form]}</div><div class="label">${formNames[form]}</div></div>`);
    }
    document.write('</div>');
}
</script>
</body></html>
