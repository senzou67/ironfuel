    <!-- Force cache bust — fetches /version.json DIRECTLY from server bypassing SW -->
    <script>
        (function(){
            var LOCAL_V = 89; // Must match version.json
            var lsWorks = true;
            try {
                localStorage.setItem('_test', '1');
                localStorage.removeItem('_test');
            } catch(e) { lsWorks = false; }

            function nukeAndReload() {
                // Save version AFTER nuke succeeds
                var done = false;
                // 1. Nuke ALL caches
                var p1 = ('caches' in window)
                    ? caches.keys().then(function(k){ return Promise.all(k.map(function(c){ return caches.delete(c); })); })
                    : Promise.resolve();
                // 2. Unregister ALL service workers
                var p2 = ('serviceWorker' in navigator)
                    ? navigator.serviceWorker.getRegistrations().then(function(r){ return Promise.all(r.map(function(sw){ return sw.unregister(); })); })
                    : Promise.resolve();

                Promise.all([p1, p2]).then(function(){
                    // Only mark version AFTER caches are actually nuked
                    if (lsWorks) try { localStorage.setItem('nutritrack_app_version', LOCAL_V); } catch(e){}
                    // Re-register SW then hard reload
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(){
                            window.location.reload(true);
                        }).catch(function(){ window.location.reload(true); });
                    } else {
                        window.location.reload(true);
                    }
                }).catch(function(){ window.location.reload(true); });
            }

            // Strategy 1: Check localStorage version (works when THIS html is already fresh)
            var stored = 0;
            if (lsWorks) try { stored = parseInt(localStorage.getItem('nutritrack_app_version') || '0'); } catch(e){}
            if (stored < LOCAL_V) {
                nukeAndReload();
                return;
            }

            // Strategy 2: Fetch /version.json from server with cache bypass
            // This catches the case where OLD cached index.html is served but server has newer version
            fetch('/version.json?_=' + Date.now(), { cache: 'no-store' })
                .then(function(r){ return r.json(); })
                .then(function(data){
                    var serverV = data.v || 0;
                    if (serverV > LOCAL_V || serverV > stored) {
                        // Server has a newer version than what this HTML knows about
                        if (lsWorks) try { localStorage.setItem('nutritrack_app_version', '0'); } catch(e){}
                        nukeAndReload();
                    } else {
                        // All good — register SW normally + check for update
                        if ('serviceWorker' in navigator) {
                            navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(reg){
                                reg.update();
                                // Listen for new SW waiting — auto-activate it
                                reg.addEventListener('updatefound', function(){
                                    var nw = reg.installing;
                                    if (nw) nw.addEventListener('statechange', function(){
                                        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                                            nw.postMessage({ type: 'SKIP_WAITING' });
                                            window.location.reload();
                                        }
                                    });
                                });
                            });
                        }
                    }
                })
                .catch(function(){
                    // Offline or fetch failed — just register SW normally
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(reg){ reg.update(); });
                    }
                });
        })();

        // Listen for FORCE_RELOAD from SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'FORCE_RELOAD') {
                    window.location.reload(true);
                }
            });
        }
    </script>
