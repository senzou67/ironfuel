<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OneFood Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; -webkit-font-smoothing: antialiased; }

        /* Login */
        .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: #1a1a1a; padding: 28px; border-radius: 16px; width: 100%; max-width: 360px; }
        .login-card h1 { font-size: 20px; margin-bottom: 16px; color: #C62828; text-align: center; }
        .login-card input { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 10px; background: #222; color: #fff; font-size: 16px; margin-bottom: 12px; }
        .login-card button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #C62828; color: white; font-weight: 700; font-size: 15px; cursor: pointer; }

        /* Dashboard */
        .dashboard { display: none; padding: 12px; padding-top: env(safe-area-inset-top, 12px); padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 70px); max-width: 900px; margin: 0 auto; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 8px 0; }
        .header h1 { font-size: 18px; color: #C62828; }
        .header-btns { display: flex; gap: 6px; }
        .header-btns button { padding: 6px 12px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #aaa; cursor: pointer; font-size: 11px; }

        /* Stats grid — 2x2 on mobile */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .stat-card { background: #1a1a1a; border-radius: 12px; padding: 12px; border: 1px solid #1e1e1e; }
        .stat-card .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .stat-card .sub { font-size: 9px; color: #555; margin-top: 2px; }
        .stat-card .value { font-size: 24px; font-weight: 800; }
        .stat-card .value.accent { color: #C62828; }
        .stat-card .value.green { color: #4CAF50; }
        .stat-card .value.blue { color: #1E88E5; }
        .stat-card .value.gold { color: #FFB300; }
        .stat-card .value.purple { color: #AB47BC; }
        .stat-card .value.cyan { color: #26C6DA; }

        /* Metrics grid — 2 cols mobile, 3 cols wider */
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        @media (min-width: 600px) { .metrics-grid { grid-template-columns: repeat(3, 1fr); } }
        .section-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .section-title-row h2 { margin-bottom: 0; }
        .metrics-updated { font-size: 9px; color: #444; }

        /* Sections */
        .section { background: #1a1a1a; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #1e1e1e; }
        .section h2 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #ccc; display: flex; align-items: center; gap: 6px; }
        .section h2 span { font-size: 10px; color: #555; font-weight: 400; }

        /* Actions — scroll on mobile, grid on desktop */
        .actions-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-wrap: nowrap; }
        .actions-scroll::-webkit-scrollbar { display: none; }
        @media (min-width: 600px) {
            .actions-scroll { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); overflow-x: visible; flex-wrap: wrap; }
        }
        .action-chip { flex-shrink: 0; background: #222; border-radius: 10px; padding: 10px 14px; cursor: pointer; border: 1px solid #2a2a2a; text-align: center; min-width: 90px; }
        .action-chip:active { background: #333; }
        .action-chip .icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .action-chip .text { font-size: 10px; color: #aaa; font-weight: 600; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 6px; color: #555; border-bottom: 1px solid #222; font-weight: 600; font-size: 10px; text-transform: uppercase; }
        td { padding: 8px 6px; border-bottom: 1px solid #151515; }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* Badges */
        .badge { padding: 2px 7px; border-radius: 8px; font-size: 9px; font-weight: 700; white-space: nowrap; }
        .badge.premium { background: #C6282825; color: #EF5350; }
        .badge.free { background: #22222280; color: #666; }
        .badge.active { background: #4CAF5025; color: #81C784; }

        /* Broadcast form */
        .broadcast-form { display: none; margin-top: 10px; }
        .broadcast-form input, .broadcast-form textarea { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 8px; background: #222; color: #fff; font-size: 14px; margin-bottom: 8px; font-family: inherit; }
        .broadcast-form textarea { min-height: 50px; resize: vertical; }

        /* Notes */
        #admin-notes { width: 100%; min-height: 120px; padding: 12px; border: 1px solid #2a2a2a; border-radius: 10px; background: #151515; color: #ddd; font-size: 13px; font-family: inherit; resize: vertical; line-height: 1.5; }

        /* Buttons */
        .btn-sm { padding: 8px 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; }
        .btn-red { background: #C62828; color: white; }
        .btn-green { background: #4CAF50; color: white; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #aaa; }

        /* Test tabs */
        .test-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
        .test-tab { flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; text-align: center; border: 2px solid #333; background: transparent; color: #666; }
        .test-tab.active-premium { border-color: #4CAF50; background: #4CAF5015; color: #4CAF50; }
        .test-tab.active-free { border-color: #EF5350; background: #EF535015; color: #EF5350; }

        /* Loading */
        .loading { text-align: center; padding: 30px; color: #444; font-size: 12px; }

        /* Bottom nav */
        .admin-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222; display: flex; padding: 6px 0; padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
        .admin-nav button { flex: 1; background: none; border: none; color: #555; cursor: pointer; padding: 6px 0; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 9px; font-weight: 600; }
        .admin-nav button.active { color: #C62828; }
        .admin-nav button .nav-icon { font-size: 18px; }

        /* Tab panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="login" id="login">
        <div class="login-card">
            <h1>🔴 OneFood Admin</h1>
            <input type="password" id="pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')login()">
            <button onclick="login()">Connexion</button>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>🔴 Admin</h1>
            <div class="header-btns">
                <button onclick="refresh()">🔄</button>
                <button onclick="logout()">Déco</button>
            </div>
        </div>

        <!-- TAB: Dashboard -->
        <div class="tab-panel active" id="panel-dashboard">
            <div class="section">
                <div class="section-title-row">
                    <h2>📈 Métriques <span id="metrics-updated" class="metrics-updated"></span></h2>
                    <button class="btn-sm btn-outline" onclick="loadMetrics()">🔄 Refresh</button>
                </div>
                <div class="metrics-grid" id="metrics"><div class="loading">Chargement...</div></div>
            </div>

            <div class="stats-grid" id="stats"><div class="loading">Chargement...</div></div>

            <div class="section">
                <h2>⚡ Actions</h2>
                <div class="actions-scroll">
                    <div class="action-chip" onclick="toggleBroadcast()"><span class="icon">📢</span><span class="text">Broadcast</span></div>
                    <div class="action-chip" onclick="window.open('https://app.netlify.com','_blank')"><span class="icon">🚀</span><span class="text">Deploy</span></div>
                    <div class="action-chip" onclick="window.open('https://dashboard.stripe.com','_blank')"><span class="icon">💳</span><span class="text">Stripe</span></div>
                    <div class="action-chip" onclick="window.open('https://sentry.io','_blank')"><span class="icon">🐛</span><span class="text">Sentry</span></div>
                    <div class="action-chip" onclick="window.open('https://console.firebase.google.com/project/ironfuel-422fe','_blank')"><span class="icon">🔥</span><span class="text">Firebase</span></div>
                    <div class="action-chip" onclick="window.open('https://search.google.com/search-console','_blank')"><span class="icon">🔍</span><span class="text">SEO</span></div>
                    <div class="action-chip" onclick="window.open('mailto:contact@1food.fr','_blank')"><span class="icon">📧</span><span class="text">Support</span></div>
                </div>
                <div class="broadcast-form" id="broadcast-form">
                    <input type="text" id="bc-title" placeholder="Titre (ex: OneFood 🔥)">
                    <textarea id="bc-body" placeholder="Message..."></textarea>
                    <div style="display:flex;gap:8px;align-items:center">
                        <button class="btn-sm btn-red" onclick="sendBroadcast()">Envoyer à tous</button>
                        <span id="bc-result" style="font-size:11px;color:#666"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: Users -->
        <div class="tab-panel" id="panel-users">
            <div class="section">
                <h2>👥 Utilisateurs <span id="user-count"></span></h2>
                <div class="table-scroll" id="users-table"><div class="loading">Chargement...</div></div>
            </div>
            <div class="section">
                <h2>💰 Paiements</h2>
                <div class="table-scroll" id="payments-table"><div class="loading">Chargement...</div></div>
            </div>
        </div>

        <!-- TAB: Test -->
        <div class="tab-panel" id="panel-test">
            <div class="section">
                <div class="test-tabs">
                    <button class="test-tab active-premium" onclick="showTestTab('premium')" id="tab-premium">⭐ Premium</button>
                    <button class="test-tab" onclick="showTestTab('free')" id="tab-free">🔒 Gratuit</button>
                </div>
                <div style="display:flex;gap:6px;margin-bottom:8px">
                    <button class="btn-sm btn-outline" onclick="reloadTest()">🔄 Refresh</button>
                    <button class="btn-sm btn-outline" onclick="window.open('/?admin_mode=premium','_blank')">↗ Plein écran</button>
                </div>
                <div style="background:#000;border-radius:12px;overflow:hidden;border:1px solid #222">
                    <iframe id="test-frame" src="/?admin_mode=premium" style="width:100%;height:600px;border:none"></iframe>
                </div>
            </div>
        </div>

        <!-- TAB: Notes -->
        <div class="tab-panel" id="panel-notes">
            <div class="section">
                <h2>📝 Notes & MAJ</h2>
                <textarea id="admin-notes" placeholder="Bugs, évolutions, notes de MAJ..."></textarea>
                <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
                    <button class="btn-sm btn-green" onclick="saveNotes()">💾 Sauvegarder</button>
                    <span id="notes-status" style="font-size:11px;color:#555"></span>
                </div>
            </div>
        </div>

        <!-- Bottom nav -->
        <nav class="admin-nav">
            <button class="active" onclick="switchTab('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span>Dashboard</button>
            <button onclick="switchTab('users')" id="nav-users"><span class="nav-icon">👥</span>Users</button>
            <button onclick="switchTab('test')" id="nav-test"><span class="nav-icon">🧪</span>Test</button>
            <button onclick="switchTab('notes')" id="nav-notes"><span class="nav-icon">📝</span>Notes</button>
        </nav>
    </div>

    <script>
        let KEY = '';
        const API = '/api/admin-api';

        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
        }

        function login() {
            KEY = document.getElementById('pwd').value;
            fetch(API + '?action=stats', { headers: { 'X-Admin-Key': KEY } })
                .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                .then(() => {
                    sessionStorage.setItem('admin_key', KEY);
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    refresh();
                })
                .catch(() => alert('Mot de passe incorrect'));
        }

        function logout() {
            sessionStorage.removeItem('admin_key');
            KEY = '';
            document.getElementById('login').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        function api(action, opts) {
            return fetch(API + '?action=' + action, { ...opts, headers: { 'X-Admin-Key': KEY, 'Content-Type': 'application/json', ...(opts?.headers || {}) } }).then(r => r.json());
        }

        async function loadMetrics() {
            const el = document.getElementById('metrics');
            el.innerHTML = '<div class="loading">Chargement...</div>';
            try {
                const m = await api('metrics');
                const fmt = (n) => (n ?? 0).toLocaleString('fr-FR');
                const pct = (n) => (n ?? 0).toFixed(2) + '%';
                const eur = (n) => (n ?? 0).toFixed(2) + '€';
                el.innerHTML = `
                    <div class="stat-card"><div class="label">DAU · 24h</div><div class="value accent">${fmt(m.dau)}</div><div class="sub">Actifs aujourd'hui</div></div>
                    <div class="stat-card"><div class="label">WAU · 7j</div><div class="value blue">${fmt(m.wau)}</div><div class="sub">Actifs 7 jours</div></div>
                    <div class="stat-card"><div class="label">MAU · 30j</div><div class="value blue">${fmt(m.mau)}</div><div class="sub">Actifs 30 jours</div></div>
                    <div class="stat-card"><div class="label">MRR</div><div class="value green">${eur(m.mrr)}</div><div class="sub">${m.subscriptions.monthly} mens. + ${m.subscriptions.annual} ann.</div></div>
                    <div class="stat-card"><div class="label">ARR</div><div class="value green">${eur(m.arr)}</div><div class="sub">Annualisé</div></div>
                    <div class="stat-card"><div class="label">ARPU</div><div class="value gold">${eur(m.arpu)}</div><div class="sub">Revenu / user</div></div>
                    <div class="stat-card"><div class="label">Conversion</div><div class="value purple">${pct(m.conversionRate)}</div><div class="sub">${fmt(m.premiumUsers)} / ${fmt(m.totalUsers)} payants</div></div>
                    <div class="stat-card"><div class="label">Churn 30j</div><div class="value accent">${pct(m.churnRate)}</div><div class="sub">${fmt(m.churnedLast30d)} résiliés</div></div>
                    <div class="stat-card"><div class="label">Rétention Premium</div><div class="value green">${pct(m.retentionRate)}</div><div class="sub">Sur 30 jours</div></div>
                    <div class="stat-card"><div class="label">Signups 24h</div><div class="value cyan">${fmt(m.newSignups.last24h)}</div><div class="sub">Nouveaux / jour</div></div>
                    <div class="stat-card"><div class="label">Signups 7j</div><div class="value cyan">${fmt(m.newSignups.last7d)}</div><div class="sub">Nouveaux 7j</div></div>
                    <div class="stat-card"><div class="label">Signups 30j</div><div class="value cyan">${fmt(m.newSignups.last30d)}</div><div class="sub">Nouveaux 30j</div></div>
                `;
                const t = m.generatedAt ? new Date(m.generatedAt).toLocaleTimeString('fr-FR') : '';
                document.getElementById('metrics-updated').textContent = t ? '· ' + t : '';
            } catch (e) {
                el.innerHTML = '<p style="color:#444;font-size:12px">Erreur de chargement</p>';
            }
        }

        async function refresh() {
            loadMetrics();
            const stats = await api('stats');
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="label">Users</div><div class="value accent">${stats.users.total}</div></div>
                <div class="stat-card"><div class="label">Premium</div><div class="value green">${stats.users.premium}</div></div>
                <div class="stat-card"><div class="label">Actifs 7j</div><div class="value blue">${stats.users.activeLastWeek}</div></div>
                <div class="stat-card"><div class="label">Notifs</div><div class="value">${stats.users.withFcm}</div></div>
                <div class="stat-card"><div class="label">Abos</div><div class="value green">${stats.subscriptions.active}</div></div>
                <div class="stat-card"><div class="label">Résiliés</div><div class="value">${stats.subscriptions.cancelled}</div></div>
                <div class="stat-card"><div class="label">Dons</div><div class="value gold">${stats.donations.total}€</div></div>
                <div class="stat-card"><div class="label">Nb dons</div><div class="value">${stats.donations.count}</div></div>
            `;

            loadNotes();

            const pay = await api('payments');
            const debugHtml = pay.debug ? `<p style="font-size:10px;color:#444;margin-bottom:8px">DB: ${pay.debug.subsDocs} abos, ${pay.debug.donDocs} dons, ${pay.debug.premiumUsers} premium users${pay.debug.subsError ? ' | Err: '+pay.debug.subsError : ''}</p>` : '';
            document.getElementById('payments-table').innerHTML = debugHtml + (pay.payments?.length ? `<table><tr><th>Type</th><th>Email</th><th>Détail</th><th>Date</th></tr>${pay.payments.map(p => `<tr><td><span class="badge ${p.type==='abo'?'premium':'active'}">${p.type==='abo'?'⭐':'💝'}</span></td><td style="color:#888;max-width:120px;overflow:hidden;text-overflow:ellipsis">${p.email}</td><td>${p.type==='abo'?(p.plan+(p.status?' · '+p.status:'')):p.amount+'€'}</td><td style="color:#555;font-size:10px">${p.date!=='—'?new Date(p.date).toLocaleDateString('fr-FR'):'—'}</td></tr>`).join('')}</table>` : '<p style="color:#444;font-size:12px">Aucun paiement trouvé dans les collections</p>');

            const data = await api('users');
            document.getElementById('user-count').textContent = '(' + data.users.length + ')';
            document.getElementById('users-table').innerHTML = data.users.length ? `<table><tr><th>Nom</th><th>Email</th><th>Statut</th><th>Actif</th></tr>${data.users.map(u => `<tr><td style="font-weight:600;font-size:12px">${u.name}</td><td style="color:#666;max-width:100px;overflow:hidden;text-overflow:ellipsis;font-size:11px">${u.email}</td><td><span class="badge ${u.paid?'premium':'free'}">${u.paid?'PRO':'Free'}</span></td><td style="color:#555;font-size:10px">${u.updatedAt!=='—'?new Date(u.updatedAt).toLocaleDateString('fr-FR'):'—'}</td></tr>`).join('')}</table>` : '<p style="color:#444;font-size:12px">Aucun utilisateur</p>';
        }

        function toggleBroadcast() {
            const f = document.getElementById('broadcast-form');
            f.style.display = f.style.display === 'none' || !f.style.display ? 'block' : 'none';
        }

        async function sendBroadcast() {
            const title = document.getElementById('bc-title').value.trim();
            const body = document.getElementById('bc-body').value.trim();
            if (!title || !body) return alert('Remplis le titre et le message');
            if (!confirm('Envoyer à TOUS les utilisateurs ?')) return;
            const res = await api('broadcast', { method: 'POST', body: JSON.stringify({ title, body }) });
            document.getElementById('bc-result').textContent = `✓ ${res.sent} envoyé(s)`;
        }

        async function loadNotes() {
            const res = await api('notes');
            const ta = document.getElementById('admin-notes');
            if (ta && res.notes) ta.value = res.notes;
        }

        async function saveNotes() {
            const notes = document.getElementById('admin-notes')?.value || '';
            await api('save-notes', { method: 'POST', body: JSON.stringify({ notes }) });
            document.getElementById('notes-status').textContent = '✓ Sauvegardé';
            setTimeout(() => { document.getElementById('notes-status').textContent = ''; }, 2000);
        }

        function reloadTest() { document.getElementById('test-frame').src = document.getElementById('test-frame').src; }

        function showTestTab(mode) {
            document.getElementById('test-frame').src = '/?admin_mode=' + mode;
            document.getElementById('tab-premium').className = 'test-tab' + (mode === 'premium' ? ' active-premium' : '');
            document.getElementById('tab-free').className = 'test-tab' + (mode === 'free' ? ' active-free' : '');
        }

        window.onload = () => {
            const saved = sessionStorage.getItem('admin_key');
            if (saved) { KEY = saved; document.getElementById('pwd').value = saved; login(); }
        };
    </script>
</body>
</html>
